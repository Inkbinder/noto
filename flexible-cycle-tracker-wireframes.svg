<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040">
  <defs>
    <style>
      .board-bg { fill: #f5f1ea; }
      .title { font: 700 30px 'Aptos', 'Segoe UI', sans-serif; fill: #222222; }
      .subtitle { font: 400 14px 'Aptos', 'Segoe UI', sans-serif; fill: #5f5b57; }
      .screen-title { font: 700 18px 'Aptos', 'Segoe UI', sans-serif; fill: #2a2a2a; }
      .label { font: 600 12px 'Aptos', 'Segoe UI', sans-serif; fill: #4e4a46; letter-spacing: 0.6px; }
      .body { font: 500 13px 'Aptos', 'Segoe UI', sans-serif; fill: #333333; }
      .body-sm { font: 500 11px 'Aptos', 'Segoe UI', sans-serif; fill: #555555; }
      .body-xs { font: 500 10px 'Aptos', 'Segoe UI', sans-serif; fill: #666666; }
      .muted { fill: #7d7771; }
      .phone { fill: #2f2f2f; }
      .screen { fill: #fcfbf8; }
      .card { fill: #ffffff; stroke: #d8d2cb; stroke-width: 1.2; }
      .soft { fill: #f0ece6; stroke: #d8d2cb; stroke-width: 1; }
      .line { stroke: #d8d2cb; stroke-width: 1; }
      .line-strong { stroke: #bdb6ae; stroke-width: 1.5; }
      .dashed { stroke: #c8bcae; stroke-width: 1.5; stroke-dasharray: 5 4; fill: none; }
      .selected { stroke: #dd7a3d; stroke-width: 3; fill: none; }
      .today { stroke: #8e8780; stroke-width: 1.5; fill: none; }
      .banner { fill: #dff2df; }
      .chip { fill: #ffffff; stroke: #cfc8c0; stroke-width: 1; }
      .chip-selected-red { fill: #d86a6a; stroke: #d86a6a; }
      .chip-selected-teal { fill: #6fa8a4; stroke: #6fa8a4; }
      .chip-selected-orange { fill: #d7a15c; stroke: #d7a15c; }
      .chip-selected-blue { fill: #6e8fd7; stroke: #6e8fd7; }
      .chip-selected-olive { fill: #9a9055; stroke: #9a9055; }
      .chip-text-dark { font: 600 11px 'Aptos', 'Segoe UI', sans-serif; fill: #444444; }
      .chip-text-light { font: 600 11px 'Aptos', 'Segoe UI', sans-serif; fill: #ffffff; }
      .accent-red { fill: #d86a6a; }
      .accent-teal { fill: #6fa8a4; }
      .accent-orange { fill: #d7a15c; }
      .accent-blue { fill: #6e8fd7; }
      .accent-olive { fill: #9a9055; }
      .accent-green { fill: #7fb67f; }
      .tint-red { fill: #f2d5d5; }
      .tint-teal { fill: #d7ebe8; }
      .tint-orange { fill: #f3e2c8; }
      .tint-blue { fill: #dbe4f8; }
      .tint-olive { fill: #e6e0c5; }
      .tint-green { fill: #d9ebd9; }
      .badge { fill: #ffffff; stroke: #cfc8c0; stroke-width: 1; }
