  <rect class="board-bg" x="0" y="0" width="1800" height="1040" rx="24"/>

  <text class="title" x="70" y="68">Flexible Cycle Tracker Wireframes</text>
  <text class="subtitle" x="70" y="95">Low-fidelity mobile concepts based on the design doc: calendar-first, custom tags, segmented day fills, and lightweight period prediction.</text>

  <g transform="translate(70 170)">
